name: mousetrap
description: A gag app — realistic 3D cheese triggers a mousetrap on tap.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  flutter_animate: ^4.5.0
  google_mobile_ads: ^5.1.0
  provider: ^6.1.2
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/snap.mp3
    - assets/models/cheese.obj
